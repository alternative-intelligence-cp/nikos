name: Build NIKOS on macOS

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      MAKEFLAGS: -j4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install cmake boost gmp sqlite tbb llvm@20

      - name: Build NIKOS
        run: |
          export PATH="$(brew --prefix llvm@20)/bin:$PATH"
          export LDFLAGS="-L$(brew --prefix llvm@20)/lib"
          export CPPFLAGS="-I$(brew --prefix llvm@20)/include"
          mkdir build && cd build
          cmake \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install" \
            -DCMAKE_BUILD_TYPE="Release" \
            -DLLVM_CONFIG_EXECUTABLE="$(brew --prefix llvm@20)/bin/llvm-config" \
            ..
          make

      - name: Install
        run: |
          cd build
          make install

      - name: Verify installation
        run: |
          export PATH="${GITHUB_WORKSPACE}/install/bin:$PATH"
          ikos --version
