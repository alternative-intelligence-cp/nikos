name: Build NIKOS on Linux

on:
  push:
    branches: [main, dev-*]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    env:
      MAKEFLAGS: -j4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main"
          sudo apt-get update

      - name: Install dependencies
        run: |
          sudo apt-get install --yes \
            gcc g++ cmake libgmp-dev libboost-all-dev \
            libsqlite3-dev libtbb-dev libz-dev libedit-dev \
            python3 python3-pip \
            llvm-20 llvm-20-dev llvm-20-tools clang-20 libclang-20-dev

      - name: Build NIKOS
        run: |
          mkdir build && cd build
          cmake \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install" \
            -DCMAKE_BUILD_TYPE="Release" \
            -DLLVM_CONFIG_EXECUTABLE="/usr/lib/llvm-20/bin/llvm-config" \
            ..
          make

      - name: Install
        run: |
          cd build
          make install

      - name: Add NIKOS to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/install/bin" >> $GITHUB_PATH

      - name: Verify installation
        run: |
          ikos --version
          ikos-analyzer --help | head -5
